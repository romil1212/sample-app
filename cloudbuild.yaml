steps:
- name: 'gcr.io/cloud-builders/go'
  args: ['build', '-o', 'main', 'main.go']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-prod:v1.0', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-prod:v1.0']
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'prod/deployment.yaml']
  env:
  - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-d'
  - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'
