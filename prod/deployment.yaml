apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - name: production-container
        image: europe-west1-docker.pkg.dev/qwiklabs-gcp-00-d5708dcc9026/my-repository/sample-app-prod:v2.0
        ports:
        - containerPort: 8080
