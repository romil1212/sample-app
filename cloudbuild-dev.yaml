steps:
- name: 'gcr.io/cloud-builders/go'
  args: ['build', '-o', 'main', 'main.go']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-dev:v2.0', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-dev:v2.0']
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['container', 'clusters', 'get-credentials', 'hello-cluster', '--zone', 'europe-west1-b']
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'dev/deployment.yaml', '--namespace', 'dev']
